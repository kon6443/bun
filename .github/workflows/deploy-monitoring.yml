name: Deploy Monitoring Stack

on:
  push:
    branches:
      - main
    paths:
      - 'infra/prometheus/**'
      - 'infra/alertmanager/**'
      - 'infra/grafana/**'
      - 'infra/loki/**'
      - 'infra/promtail/**'
      - 'infra/docker-stack.monitoring.yml'
      - 'infra/docker-stack.monitoring.shared.yml'
      - '.github/workflows/deploy-monitoring.yml'
  workflow_dispatch:

# 같은 브랜치 동시 배포 충돌 방지 (mobisell-back 패턴 차용).
# cancel-in-progress: false → 이미 진행 중인 배포는 완료까지 대기 (중간 취소 X)
concurrency:
  group: deploy-monitoring-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ============================================
  # 1단계: shared 스택 (node_exporter — global 모든 노드)
  # ============================================
  deploy-monitoring-shared:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rsync shared stack files to Swarm manager
        run: |
          set -euo pipefail
          echo "${{ secrets.SWARM_MANAGER_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          rsync -avz --relative \
            -e "ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no" \
            infra/docker-stack.monitoring.shared.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }}:/home/ubuntu/desktop/deploy/
          rm /tmp/ssh_key

      - name: Deploy shared stack via SSH (converge 동기 대기)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_SERVER }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SWARM_MANAGER_SSH_KEY }}
          script_stop: true   # 중간 명령 실패 시 즉시 job 실패 (silent failure 방지)
          script: |
            set -euxo pipefail
            cd /home/ubuntu/desktop/deploy

            echo "=== [shared 1/2] Stack deploy ==="
            docker stack deploy --detach=false \
              -c infra/docker-stack.monitoring.shared.yml \
              monitor_shared

            echo "=== [shared 2/2] Services status ==="
            docker stack services monitor_shared

  # ============================================
  # 2단계: prod 스택 (Prometheus — Grafana/Alertmanager/Loki는 Step 3/6에서 추가)
  # ============================================
  deploy-monitoring-prod:
    needs: deploy-monitoring-shared
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rsync prod stack files to Swarm manager
        run: |
          set -euo pipefail
          echo "${{ secrets.SWARM_MANAGER_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          rsync -avz --relative \
            -e "ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no" \
            infra/prometheus \
            infra/docker-stack.monitoring.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }}:/home/ubuntu/desktop/deploy/
          rm /tmp/ssh_key

      - name: Deploy prod stack via SSH (sha256 config + converge 동기 대기)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_SERVER }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SWARM_MANAGER_SSH_KEY }}
          script_stop: true
          script: |
            set -euxo pipefail
            cd /home/ubuntu/desktop/deploy

            echo "=== [prod 1/5] Files check ==="
            ls -la infra/prometheus/prometheus.yml
            ls -la infra/docker-stack.monitoring.yml

            echo "=== [prod 2/5] Hash calc ==="
            PROM_CFG_HASH=$(sha256sum infra/prometheus/prometheus.yml | awk '{print $1}' | cut -c1-12)
            export PROM_CFG_HASH
            echo "PROM_CFG_HASH=$PROM_CFG_HASH"
            test -n "$PROM_CFG_HASH"

            echo "=== [prod 3/5] Stack deploy ==="
            docker stack deploy --detach=false \
              -c infra/docker-stack.monitoring.yml \
              prod_monitor

            echo "=== [prod 4/5] Services status ==="
            docker stack services prod_monitor

            echo "=== [prod 5/5] Cleanup orphaned configs ==="
            for cfg in $(docker config ls --filter "name=prod_monitor_" --format "{{.Name}}"); do
              if docker config rm "$cfg" 2>/dev/null; then
                echo "removed orphan: $cfg"
              fi
            done
            echo "cleanup done"
