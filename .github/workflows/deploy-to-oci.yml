name: Deploy NestJS to Docker Swarm

on:
  push:
    branches:
      - main
    # paths (whitelist) — 앱 빌드·배포에 직접 영향 주는 파일만 명시.
    # paths-ignore 는 merge commit 평가 시 예측이 어려워 의도 외 트리거가 발생함.
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'infra/docker-stack.app.yml'
      - '.github/workflows/deploy-to-oci.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and Push multi-arch image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.REGISTRY_URL }}/prod_nest:${{ steps.sha.outputs.short }} \
            --provenance=false \
            --sbom=false \
            --push \
            .

      - name: Rsync stack YAML to Swarm manager
        run: |
          echo "${{ secrets.SWARM_MANAGER_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          rsync -avz \
            -e "ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no" \
            infra/docker-stack.app.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }}:/home/ubuntu/desktop/deploy/infra/prod_nest.yml
          rm /tmp/ssh_key

      - name: Deploy stack via SSH (converge 동기 대기)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_SERVER }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SWARM_MANAGER_SSH_KEY }}
          script: |
            export REGISTRY_URL=${{ secrets.REGISTRY_URL }}
            export IMAGE_TAG=${{ steps.sha.outputs.short }}
            docker stack deploy --detach=false \
              -c /home/ubuntu/desktop/deploy/infra/prod_nest.yml \
              --with-registry-auth \
              prod_nest
            docker stack services prod_nest
