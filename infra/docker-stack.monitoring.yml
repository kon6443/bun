version: '3.9'

# prod 스택 — 환경별 메트릭 저장·시각화 서비스 (Step 2에서는 Prometheus만,
# Grafana/Alertmanager/Loki는 Step 3/6/logging에서 순차 추가).
#
# 배포:
#   export PROM_CFG_HASH=$(sha256sum infra/prometheus/prometheus.yml | head -c 12)
#   docker stack deploy --detach=false -c infra/docker-stack.monitoring.yml prod_monitor
#
# Config 이름에 sha256 12자 해시 포함 → 파일 변경 시 새 config 자동 생성으로
# rolling update 무중단. 미사용 config은 CI에서 주기적으로 정리.

services:
  prometheus:
    image: prom/prometheus:v3.4.1
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'  # POST /-/reload 지원 (향후 config 핫리로드용)
    configs:
      - source: prod_monitor_prometheus_yml
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus-data:/prometheus
    networks:
      - sys_default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.prod_monitor_metrics == 1
      resources:
        limits:
          memory: 400M
      restart_policy:
        condition: on-failure
    ports:
      - target: 9090
        published: 9090
        mode: host  # SSH 터널 접근 전용 (OCI VCN이 외부 9090 차단)

  grafana:
    image: grafana/grafana:12.1.0
    user: "472:472"   # Grafana 기본 uid/gid (볼륨 권한 일관성)
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Caddy subpath 서빙 — https://fivesouth.duckdns.org/grafana/
      GF_SERVER_ROOT_URL: "https://fivesouth.duckdns.org/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_DOMAIN: "fivesouth.duckdns.org"
      # 리소스 보호 (1GB 노드 — 쿼리 부하 완화)
      GF_DATAPROXY_TIMEOUT: "30"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "30s"
    configs:
      - source: prod_monitor_grafana_datasources_yml
        target: /etc/grafana/provisioning/datasources/datasources.yml
      - source: prod_monitor_grafana_dashboards_yml
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
    volumes:
      - grafana-data:/var/lib/grafana
      # 대시보드 JSON 은 디렉터리 단위 관리 → bind mount (read-only)
      # 서버에서 미리 디렉터리 생성 필요: mkdir -p /home/ubuntu/desktop/deploy/infra/grafana/provisioning/dashboards/json
      - /home/ubuntu/desktop/deploy/infra/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
    networks:
      - sys_default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.prod_monitor_view == 1   # fs-03
      resources:
        limits:
          memory: 350M
      restart_policy:
        condition: on-failure
    # ports 섹션 없음 → overlay 내부만 (Caddy가 tasks.prod_monitor_grafana:3000 으로 reverse_proxy)

  # Loki — 로그 저장·쿼리 서버 (fs-03, Grafana 와 공존).
  # ports 미노출 → overlay 내부에서만 접근 (Grafana, Promtail 이 tasks.prod_monitor_loki:3100).
  loki:
    image: grafana/loki:3.4.2
    user: "10001:10001"   # Loki 기본 uid/gid — named volume 권한 일관성
    command: -config.file=/etc/loki/config.yml
    configs:
      - source: prod_monitor_loki_yml
        target: /etc/loki/config.yml
    volumes:
      - loki-data:/loki
    networks:
      - sys_default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.prod_monitor_view == 1   # fs-03
      resources:
        limits:
          memory: 400M
      restart_policy:
        condition: on-failure

configs:
  # file: 경로는 compose 파일(infra/docker-stack.monitoring.yml)의 디렉토리 기준 상대경로.
  # → 실제 해석: /home/ubuntu/desktop/deploy/infra/<relative>
  prod_monitor_prometheus_yml:
    name: prod_monitor_prometheus_yml_${PROM_CFG_HASH:-latest}
    file: ./prometheus/prometheus.yml
  prod_monitor_grafana_datasources_yml:
    name: prod_monitor_grafana_datasources_yml_${GRAFANA_DS_CFG_HASH:-latest}
    file: ./grafana/provisioning/datasources/datasources.yml
  prod_monitor_grafana_dashboards_yml:
    name: prod_monitor_grafana_dashboards_yml_${GRAFANA_DASH_CFG_HASH:-latest}
    file: ./grafana/provisioning/dashboards/dashboards.yml
  prod_monitor_loki_yml:
    name: prod_monitor_loki_yml_${LOKI_CFG_HASH:-latest}
    file: ./loki/loki-config.yml

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  sys_default:
    external: true
