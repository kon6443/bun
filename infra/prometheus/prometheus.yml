global:
  scrape_interval: 15s
  scrape_timeout: 10s
  external_labels:
    env: prod
    cluster: oci-swarm

# Alertmanager는 Step 6에서 추가되면 주석 해제
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['tasks.prod_monitor_alertmanager:9093']

# Recording/Alert rules는 Step 4.5/6에서 추가되면 주석 해제
# rule_files:
#   - 'rules/*.yml'

scrape_configs:
  # NestJS 앱 — overlay 내부 DNS로 각 replica(task) IP를 개별 scrape
  - job_name: 'prod_nest_app'
    metrics_path: /api/v1/metrics
    dns_sd_configs:
      - names: ['tasks.prod_nest_app']
        type: A
        port: 3500

  # node_exporter — Swarm 노드별 hostname을 instance label 로 주입.
  # dockerswarm_sd_configs + relabel 로 노드 메타 획득 (IP 대신 fs-01/02/03).
  # 조건: Prometheus 컨테이너가 manager 노드에 있고 /var/run/docker.sock 마운트 필요.
  - job_name: 'node_exporter'
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: nodes
    relabel_configs:
      # scrape 주소를 노드 IP:9100 으로 (role:nodes는 포트 제공 X → 수동 지정)
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: __address__
        replacement: ${1}:9100
      # instance label = 노드 hostname (fs-01/fs-02/fs-03)
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance
      # (선택) 노드 역할/가용성도 label 로 보존
      - source_labels: [__meta_dockerswarm_node_availability]
        target_label: node_availability
      - source_labels: [__meta_dockerswarm_node_role]
        target_label: node_role

  # Prometheus self-monitoring
  - job_name: 'prometheus_self'
    static_configs:
      - targets: ['localhost:9090']
