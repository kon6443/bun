version: '3.9'

# shared 스택 — 모든 노드에서 global 실행되는 모니터링 에이전트.
# node_exporter: OS/HW 메트릭 수집. Promtail은 tasks-logging.md 단계에서 추가.
#
# 배포:
#   docker stack deploy --detach=false -c infra/docker-stack.monitoring.shared.yml monitor_shared
#
# 스택명이 monitor_shared이므로 overlay DNS는 tasks.monitor_shared_node_exporter:9100

services:
  node_exporter:
    image: prom/node-exporter:v1.8.2
    # Swarm 템플릿으로 컨테이너 hostname 을 노드 hostname(fs-01/02/03)으로 설정.
    # → node_uname_info 메트릭의 nodename label 이 실제 노드명으로 기록되어
    #    Grafana Dashboard 1860 의 Nodename 드롭다운이 정상 채워짐.
    hostname: '{{.Node.Hostname}}'
    # 호스트의 /proc, /sys, / 를 별도 bind → 컨테이너 파일시스템이 아닌
    # 호스트 메트릭을 수집 (node_exporter 공식 권장 배포 구성).
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - '/proc:/host/proc:ro'
      - '/sys:/host/sys:ro'
      - '/:/rootfs:ro'
    networks:
      - sys_default
    deploy:
      mode: global
      resources:
        limits:
          memory: 50M
      restart_policy:
        condition: on-failure
    # ports 없음 → overlay 내부에서만 접근 (Prometheus가 DNS로 scrape)

networks:
  sys_default:
    external: true
