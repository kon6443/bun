version: '3.8'

services:
  caddy:
    image: caddy:latest
    command: ["caddy", "run", "--watch", "--config", "/config/Caddyfile", "--adapter", "caddyfile"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ubuntu/desktop/deploy/infra/caddy/config:/config
      - /home/ubuntu/desktop/deploy/infra/caddy/data:/data
    networks:
      - sys_default
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.sys_caddy == 1
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 5s
        max_failure_ratio: 0
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 5s
        max_failure_ratio: 0
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - sys_default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  registry:
    image: registry:2
    environment:
      REGISTRY_CONFIGURATION_PATH: /etc/docker/registry/config.yml
    ports:
      - target: 5000
        published: 5000
        mode: ingress
    volumes:
      - /home/ubuntu/desktop/deploy/sys/registry/auth:/auth
      - /home/ubuntu/desktop/deploy/sys/registry/config.yml:/etc/docker/registry/config.yml
      - /home/ubuntu/desktop/deploy/sys/registry/data:/var/lib/registry
    networks:
      - sys_default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra_registry == 1
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: pause
        monitor: 5s
        max_failure_ratio: 0
      rollback_config:
        parallelism: 1
        order: stop-first
        failure_action: pause
        monitor: 5s
        max_failure_ratio: 0
      restart_policy:
        condition: on-failure

volumes:
  redis-data:

networks:
  sys_default:
    external: true
