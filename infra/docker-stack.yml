version: '3.8'

services:
  caddy:
    image: caddy:latest
    command: ["caddy", "run", "--watch", "--config", "/config/Caddyfile", "--adapter", "caddyfile"]
    # host 모드 — Swarm ingress IPVS 우회 → 클라이언트 공인 IP 보존
    # (IP 화이트리스트 사용을 위해 필수. ingress 모드는 L4 SNAT 해서 IP 가려짐)
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host    # HTTP/3 (QUIC)
    volumes:
      - /home/ubuntu/desktop/deploy/infra/caddy/config:/config
      - /home/ubuntu/desktop/deploy/infra/caddy/data:/data
    networks:
      - sys_default
    deploy:
      # host 모드는 동일 노드에서 80/443 포트 충돌 → replicas 1 고정
      # (Caddyfile 변경은 --watch + caddy reload 로 무중단. 이미지 교체만 수초 다운타임)
      replicas: 1
      placement:
        constraints:
          - node.labels.infra_caddy == 1
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 5s
        max_failure_ratio: 0
        order: stop-first   # host 모드는 start-first 불가 (포트 충돌)
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 5s
        max_failure_ratio: 0
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - sys_default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  registry:
    image: registry:2
    environment:
      REGISTRY_CONFIGURATION_PATH: /etc/docker/registry/config.yml
    ports:
      - target: 5000
        published: 5000
        mode: ingress
    volumes:
      - /home/ubuntu/desktop/deploy/sys/registry/auth:/auth
      - /home/ubuntu/desktop/deploy/sys/registry/config.yml:/etc/docker/registry/config.yml
      - /home/ubuntu/desktop/deploy/sys/registry/data:/var/lib/registry
    networks:
      - sys_default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra_registry == 1
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: pause
        monitor: 5s
        max_failure_ratio: 0
      rollback_config:
        parallelism: 1
        order: stop-first
        failure_action: pause
        monitor: 5s
        max_failure_ratio: 0
      restart_policy:
        condition: on-failure

volumes:
  redis-data:

networks:
  sys_default:
    external: true
